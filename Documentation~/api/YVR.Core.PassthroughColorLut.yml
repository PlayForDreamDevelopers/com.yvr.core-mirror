  syntax:
    content: public PassthroughColorLut(Color[] initialColorLut, PassthroughColorLutChannels channels)
    parameters:
    - id: initialColorLut
      type: UnityEngine.Color[]
      description: Color array to initialize the LUT from
    - id: channels
      type: YVR.Core.PassthroughColorLutChannels
      description: Color channels for one color LUT entry
    content.vb: Public Sub New(initialColorLut As Color(), channels As PassthroughColorLutChannels)
