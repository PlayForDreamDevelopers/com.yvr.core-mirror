    id: .ctor
    path: ../com.yvr.core/Scripts/Runtime/Passthrough/PassthroughColorLut.cs
    startLine: 48
  assemblies:
  - YVR.Core.Runtime
  namespace: YVR.Core
  summary: >-
    Initialize the color LUT data from a texture. Color channels are inferred from texture format.

    Use `UpdateFrom()` to update LUT data after construction.
  example: []
  syntax:
    content: public PassthroughColorLut(Texture2D initialLutTexture, bool flipY = true)
    parameters:
    - id: initialLutTexture
      type: UnityEngine.Texture2D
      description: Texture to initialize the LUT from
    - id: flipY
      type: System.Boolean
      description: >-
        Flag to inform whether the LUT texture should be flipped vertically. This is needed for LUT images which have color (0, 0, 0)
            in the top-left corner. Some color grading systems, e.g. Unity post-processing, have color (0, 0, 0) in the bottom-left corner,
            in which case flipping is not needed.
    content.vb: Public Sub New(initialLutTexture As Texture2D, flipY As Boolean = True)
